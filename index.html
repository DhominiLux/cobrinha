<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Cobrinha Mobile</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #4CAF50;
        }
        #score {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        canvas {
            background-color: #111;
            border: 4px solid #4CAF50;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            max-width: 90vw;
            max-height: 40vh;
        }
        /* Controles Mobile */
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 10px;
            justify-content: center;
        }
        .btn {
            background-color: #333;
            color: white;
            border: 2px solid #555;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:active {
            background-color: #4CAF50;
            border-color: #4CAF50;
            transform: scale(0.95);
        }
        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <h1>Snake Game</h1>
    <div id="score">Pontos: 0</div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- Painel de controle para telas de toque -->
    <div class="controls">
        <button class="btn" id="up">↑</button>
        <button class="btn" id="left">←</button>
        <button class="btn" id="right">→</button>
        <button class="btn" id="down">↓</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Configurações do jogo
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameSpeed = 100; // Velocidade em milissegundos (menor = mais rápido)

        // Loop principal do jogo
        function main() {
            if (hasGameEnded()) {
                alert(`Fim de jogo! Você fez ${score} pontos.`);
                resetGame();
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // Iniciar o loop
        resetGame();

        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#4CAF50";
            snake.forEach((part, index) => {
                // A cabeça da cobra tem uma cor ligeiramente diferente
                ctx.fillStyle = index === 0 ? "#81C784" : "#4CAF50";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            // Se o jogo não começou (parado), não move
            if (dx === 0 && dy === 0) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Verifica se comeu a comida
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = "Pontos: " + score;
                generateFood();
            } else {
                snake.pop(); // Remove a cauda se não comeu
            }
        }

        function drawFood() {
            ctx.fillStyle = "#FF5252";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Garante que a comida não surja em cima da cobra
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) generateFood();
            });
        }

        function hasGameEnded() {
            // Colisão com as paredes
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // Colisão com o próprio corpo
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            food = {x: 5, y: 5};
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerText = "Pontos: " + score;
            clearInterval(gameInterval);
            gameInterval = setInterval(main, gameSpeed);
        }

        // Funções de direção (evitam que a cobra volte contra si mesma)
        function changeDirection(direction) {
            if (direction === "UP" && dy !== 1) { dx = 0; dy = -1; }
            if (direction === "DOWN" && dy !== -1) { dx = 0; dy = 1; }
            if (direction === "LEFT" && dx !== 1) { dx = -1; dy = 0; }
            if (direction === "RIGHT" && dx !== -1) { dx = 1; dy = 0; }
        }

        // Ouvintes de teclado (para PC)
        document.addEventListener("keydown", event => {
            if (event.key === "ArrowUp") changeDirection("UP");
            if (event.key === "ArrowDown") changeDirection("DOWN");
            if (event.key === "ArrowLeft") changeDirection("LEFT");
            if (event.key === "ArrowRight") changeDirection("RIGHT");
        });

        // Ouvintes de toque dos botões na tela (para Celular)
        document.getElementById("up").addEventListener("click", () => changeDirection("UP"));
        document.getElementById("down").addEventListener("click", () => changeDirection("DOWN"));
        document.getElementById("left").addEventListener("click", () => changeDirection("LEFT"));
        document.getElementById("right").addEventListener("click", () => changeDirection("RIGHT"));

    </script>
</body>
</html>
